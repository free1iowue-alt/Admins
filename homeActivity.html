<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR MOTIVATIONAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #141E30, #243B55);
      color: #fff;
      min-height: 100vh;
    }

    /* Header */
    header {
      text-align: center;
      padding: 60px 20px;
    }

    header h1 {
      font-size: 3.5rem;
      letter-spacing: 3px;
    }

    header p {
      font-size: 1.2rem;
      margin-top: 15px;
      opacity: 0.9;
    }

    /* Services Section */
    .services {
      max-width: 1200px;
      margin: auto;
      padding: 40px 20px;
    }

    .services h2 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 40px;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .service-btn {
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border: none;
      cursor: pointer;
      color: #fff;
      font-size: 1.1rem;
      transition: 0.3s;
    }

    .service-btn:hover {
      transform: translateY(-5px);
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #000;
    }

    /* Content Display */
    .content-box {
      margin-top: 50px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.4);
      min-height: 150px;
      text-align: center;
      font-size: 1.2rem;
    }

    /* Footer */
    footer {
      margin-top: 60px;
      text-align: center;
      padding: 25px;
      background: rgba(0, 0, 0, 0.5);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>AR MOTIVATIONAL</h1>
    <p>Inspiring Minds | Building Confidence | Creating Success</p>
  </header>

  <!-- Services -->
  <section class="services">
    <h2>Our Motivational Services</h2>

    <div class="service-grid">
      <button class="service-btn" onclick="showContent('daily')">Daily Motivation</button>
      <button class="service-btn" onclick="showContent('quotes')">Success Quotes</button>
      <button class="service-btn" onclick="showContent('videos')">Motivational Videos</button>
      <button class="service-btn" onclick="showContent('goals')">Goal Setting</button>
      <button class="service-btn" onclick="showContent('mindset')">Positive Mindset</button>
      <button class="service-btn" onclick="showContent('confidence')">Confidence Boost</button>
      <button class="service-btn" onclick="showContent('career')">Career Guidance</button>
      <button class="service-btn" onclick="showContent('life')">Life Coaching</button>
      <button class="service-btn" onclick="showContent('fitness')">Fitness Motivation</button>
      <button class="service-btn" onclick="showContent('study')">Study Motivation</button>
    </div>

    <div class="content-box" id="contentBox">
      Click any service button to see the content here 🚀
    </div>
  </section>

  <!-- Footer -->
  <footer>
    © 2025 AR MOTIVATIONAL | Believe in Yourself 💪
  </footer>

  <!-- JavaScript -->
  <script>
    function showContent(type) {
      const contentBox = document.getElementById("contentBox");

      const content = {
        daily: "🌞 Start your day with positivity. Every morning is a new opportunity to grow.",
        quotes: "💬 'Success is not final, failure is not fatal: It is the courage to continue that counts.'",
        videos: "🎥 Watch motivational videos daily to stay inspired and focused on your dreams.",
        goals: "🎯 Set clear goals, break them into steps, and take action every single day.",
        mindset: "🧠 A positive mindset turns challenges into opportunities.",
        confidence: "🔥 Believe in yourself. Confidence is built through action and self-trust.",
        career: "💼 Choose a career you love and keep improving your skills consistently.",
        life: "🌱 Life coaching helps you unlock your true potential and inner strength.",
        fitness: "🏋️ Your body can achieve what your mind believes.",
        study: "📚 Study with focus today so your future can shine tomorrow."
      };

      contentBox.innerHTML = content[type];
    }
  </script>

</body>
</html>
